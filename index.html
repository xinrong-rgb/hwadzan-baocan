<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>華藏淨宗學會 — 報餐登記</title>
<style>
  :root {
    --bg: #faf6ee;
    --card: #ffffff;
    --primary: #8b6f3f;
    --primary-dark: #6b5430;
    --accent: #c4a36b;
    --text: #3a2f1f;
    --muted: #8a7a65;
    --border: #e6dcc8;
    --danger: #b54040;
    --plus: #2e7d4f;
    --minus: #b54040;
  }
  * { box-sizing: border-box; }
  body {
    font-family: "Noto Sans TC", "PingFang TC", "Hiragino Sans", sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0; padding: 0;
    font-size: 15px;
  }
  header {
    background: var(--primary);
    color: white;
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  .badge {
    display: inline-block;
    background: var(--accent);
    color: white;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    margin-left: 6px;
  }
  .user-info {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; opacity: 0.95; flex-wrap: wrap;
  }
  .user-info button {
    background: rgba(255,255,255,0.2);
    color: white;
    border: 1px solid rgba(255,255,255,0.4);
    padding: 2px 8px; border-radius: 4px;
    cursor: pointer; font-size: 11px; font-family: inherit;
  }
  .user-info button:hover { background: rgba(255,255,255,0.35); }
  nav.tabs {
    background: white;
    border-bottom: 1px solid var(--border);
    display: flex; overflow-x: auto;
  }
  nav.tabs button {
    background: none; border: none;
    padding: 12px 18px; cursor: pointer;
    font-size: 15px; color: var(--muted);
    border-bottom: 3px solid transparent;
    white-space: nowrap; font-family: inherit;
  }
  nav.tabs button.active {
    color: var(--primary);
    border-bottom-color: var(--primary);
    font-weight: 600;
  }
  main { padding: 16px; max-width: 1200px; margin: 0 auto; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px; margin-bottom: 16px;
  }
  h2 { font-size: 16px; margin: 0 0 12px; color: var(--primary-dark); }
  label { display: block; margin-bottom: 4px; font-size: 13px; color: var(--muted); }
  input, select, textarea {
    width: 100%; padding: 8px 10px;
    border: 1px solid var(--border); border-radius: 4px;
    font-family: inherit; font-size: 14px; background: white;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); }
  .grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); }
  .row-buttons { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  button.btn {
    background: var(--primary); color: white;
    border: none; padding: 8px 16px;
    border-radius: 4px; cursor: pointer;
    font-size: 14px; font-family: inherit;
  }
  button.btn:hover { background: var(--primary-dark); }
  button.btn.secondary { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
  button.btn.danger { background: var(--danger); }
  button.btn:disabled { opacity: 0.5; cursor: not-allowed; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); }
  th { background: #f5ecd9; color: var(--primary-dark); font-weight: 600; font-size: 13px; }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  tr.total td { font-weight: 700; background: #faf2e0; }
  tr.total td.meal-total { color: #c4632a; }
  td.day-total { color: #1c5fa8; font-weight: 700; }
  tr.date-header td {
    background: #efe6cc; color: var(--primary-dark);
    font-weight: 700; padding: 10px; font-size: 14px;
  }
  .pill {
    display: inline-block; padding: 2px 8px;
    border-radius: 10px; font-size: 12px; background: #efe6cc;
  }
  .pill.closed { background: #e0d8c8; color: var(--muted); }
  .delta-plus { color: var(--plus); font-weight: 600; }
  .delta-minus { color: var(--minus); font-weight: 600; }
  .msg { padding: 10px 12px; border-radius: 4px; margin-bottom: 12px; display: none; }
  .msg.error { background: #f9e2e2; color: var(--danger); display: block; }
  .msg.success { background: #e1f0e3; color: var(--plus); display: block; }
  .empty { color: var(--muted); text-align: center; padding: 24px; }
  .table-wrap { overflow-x: auto; }
  .small { font-size: 12px; color: var(--muted); }
  .refresh-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .toggle-auto { font-size: 12px; display: flex; align-items: center; gap: 6px; color: var(--muted); }
  .toggle-auto input { width: auto; }
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.55); z-index: 1000;
    align-items: center; justify-content: center; padding: 16px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: white; border-radius: 8px;
    max-width: 420px; width: 100%; padding: 24px;
    box-shadow: 0 6px 30px rgba(0,0,0,0.2);
  }
  .modal h2 { margin: 0 0 8px; }
  .modal p { color: var(--muted); margin: 0 0 16px; font-size: 14px; line-height: 1.6; }
  .modal .field { margin-bottom: 12px; }
  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr 1fr; }
    th, td { padding: 6px 8px; font-size: 13px; }
    main { padding: 10px; }
  }
</style>
</head>
<body>
<header>
  <h1>華藏淨宗學會 — 報餐登記</h1>
  <div class="user-info">
    <span id="userDisplay">載入中…</span>
    <span id="adminBadge" class="badge" style="display:none;">管理員</span>
    <button id="changeIdentityBtn" type="button" style="display:none;" onclick="showSetupModal()">變更</button>
  </div>
</header>

<!-- ========== 首次設定彈窗 ========== -->
<div class="modal-overlay" id="setupModal">
  <div class="modal">
    <h2>🍱 歡迎使用報餐系統</h2>
    <p>請告訴我們您是誰，這個資訊只會存在您自己的瀏覽器，下次來自動帶入，不會傳到別人那邊。</p>
    <div class="field">
      <label>您的 Email *</label>
      <input type="email" id="setupEmail" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>您的姓名 *</label>
      <input type="text" id="setupName" placeholder="陳大同" autocomplete="name">
    </div>
    <div id="setupMsg" class="msg"></div>
    <button class="btn" id="setupSubmit" style="width:100%;" onclick="submitSetup()">開始使用</button>
  </div>
</div>

<nav class="tabs">
  <button data-tab="register" class="active">我的登記</button>
  <button data-tab="overview">總覽</button>
  <button data-tab="log" id="logTab" style="display:none;">日誌</button>
  <button data-tab="admin" id="adminTab" style="display:none;">日期設定</button>
</nav>

<main>
  <div id="globalMsg" class="msg"></div>

  <!-- ========== 我的登記 ========== -->
  <section id="tab-register">
    <div class="card">
      <h2 id="formTitle">新增報餐登記</h2>
      <input type="hidden" id="editId">
      <div class="grid">
        <div><label>單位 / 組別 *</label><input type="text" id="f-unit" placeholder="例：接待組"></div>
        <div><label>報餐聯絡人 *</label><input type="text" id="f-contact" placeholder="姓名"></div>
        <div><label>手機號 *</label><input type="tel" id="f-phone" placeholder="0912-345-678"></div>
        <div><label>報餐日期 *</label><select id="f-date"><option value="">— 請選擇 —</option></select></div>
        <div><label>午餐</label><input type="number" id="f-lunch" min="0" value="0"></div>
        <div><label>晚餐</label><input type="number" id="f-dinner" min="0" value="0"></div>
      </div>
      <div style="margin-top:12px;">
        <label>備註</label>
        <textarea id="f-note" rows="2" placeholder="例：在幾點前要先領取餐盒"></textarea>
      </div>
      <div class="row-buttons">
        <button class="btn" id="btnSave">儲存登記</button>
        <button class="btn secondary" id="btnCancel" style="display:none;">取消編輯</button>
      </div>
    </div>

    <div class="card">
      <div class="refresh-bar">
        <h2 style="margin:0;">我的登記紀錄</h2>
        <button class="btn secondary" onclick="loadMine()">重新整理</button>
      </div>
      <div id="mineList" class="table-wrap"></div>
    </div>
  </section>

  <!-- ========== 總覽 ========== -->
  <section id="tab-overview" style="display:none;">
    <div class="card" style="padding:12px 16px;">
      <label for="overviewDateFilter" style="display:inline-block;margin-right:8px;font-size:14px;color:var(--text);">📅 查看日期</label>
      <select id="overviewDateFilter" style="width:auto;display:inline-block;min-width:180px;" onchange="onDateFilterChange()">
        <option value="">全部日期</option>
      </select>
    </div>
    <div class="card">
      <div class="refresh-bar">
        <h2 style="margin:0;">每日總人數</h2>
        <div style="display:flex;gap:12px;align-items:center;">
          <label class="toggle-auto"><input type="checkbox" id="autoRefresh" checked>自動更新（10 秒）</label>
          <button class="btn secondary" onclick="loadOverview()">重新整理</button>
        </div>
      </div>
      <div id="summaryByDate" class="table-wrap"></div>
    </div>
    <div class="card" id="cardByUnit">
      <h2>各單位 / 組別明細</h2>
      <div id="summaryByUnit" class="table-wrap"></div>
    </div>
  </section>

  <!-- ========== 日誌 ========== -->
  <section id="tab-log" style="display:none;">
    <div class="card">
      <div class="refresh-bar">
        <h2 style="margin:0;">變動日誌（最新在上）</h2>
        <button class="btn secondary" onclick="loadLog()">重新整理</button>
      </div>
      <div id="logList" class="table-wrap"></div>
    </div>
  </section>

  <!-- ========== 管理員 ========== -->
  <section id="tab-admin" style="display:none;">
    <div class="card">
      <h2>新增開放日期</h2>
      <div class="grid">
        <div><label>日期</label><input type="date" id="adm-date"></div>
        <div><label>說明（法會名稱等）</label><input type="text" id="adm-label" placeholder="例：清明祭祖法會"></div>
      </div>
      <div class="row-buttons">
        <button class="btn" onclick="adminAddDate()">新增日期</button>
      </div>
    </div>
    <div class="card">
      <div class="refresh-bar">
        <h2 style="margin:0;">已設定日期</h2>
        <button class="btn secondary" onclick="loadAdminDates()">重新整理</button>
      </div>
      <div id="adminDateList" class="table-wrap"></div>
    </div>
  </section>
</main>

<script>
// =============== 設定 ===============
// 部署後請把下面這行換成你的 Apps Script Web App URL（以 /exec 結尾）
const API_URL = 'https://script.google.com/macros/s/AKfycbwGg-Vj-kS7PBm1501NYlRoKhxiBgqjsSjP-cfkvabHiy2CIJjq2NDrQKFvd6MbkC7h/exec';

const LS_EMAIL = 'hwadzan_meal_email';
const LS_NAME = 'hwadzan_meal_name';
// 手機號 per-email 記住，鍵：hwadzan_meal_phone__<email>
const phoneKey = (email) => 'hwadzan_meal_phone__' + (email || '').toLowerCase();

let state = {
  email: '', name: '', phone: '',
  isAdmin: false,
  openDates: [],
  autoTimer: null,
  overviewFilter: ''
};
let lastSummary = null;

// =============== fetch 呼叫後端 ===============
// 用 GET + query string，避免 ANYONE_ANONYMOUS 部署 POST 被 Google redirect 弄壞的問題
async function api(action, ...args) {
  const url = new URL(API_URL);
  url.searchParams.set('action', action);
  url.searchParams.set('args', JSON.stringify(args));
  // 加個亂數避免瀏覽器/中介層快取
  url.searchParams.set('_t', Date.now());
  const res = await fetch(url.toString(), { method: 'GET', redirect: 'follow' });
  const json = await res.json();
  if (!json.ok) throw new Error(json.error || '未知錯誤');
  return json.data;
}

// =============== 啟動 ===============
window.addEventListener('load', async () => {
  state.email = localStorage.getItem(LS_EMAIL) || '';
  state.name = localStorage.getItem(LS_NAME) || '';
  state.phone = state.email ? (localStorage.getItem(phoneKey(state.email)) || '') : '';

  document.querySelectorAll('nav.tabs button').forEach(b => {
    b.addEventListener('click', () => switchTab(b.dataset.tab));
  });
  document.getElementById('btnSave').addEventListener('click', saveReg);
  document.getElementById('btnCancel').addEventListener('click', cancelEdit);
  document.getElementById('autoRefresh').addEventListener('change', toggleAuto);

  try {
    const data = await api('getBootstrap', state.email);
    onBoot(data);
  } catch (e) { onError(e); }
});

function onBoot(data) {
  state.isAdmin = data.isAdmin;
  state.openDates = data.openDates;
  if (data.isAdmin && data.email) {
    state.email = data.email;
    if (!state.name) state.name = data.email.split('@')[0];
    localStorage.setItem(LS_EMAIL, state.email);
    if (state.name) localStorage.setItem(LS_NAME, state.name);
  }
  if (data.needsSetup && !state.email) { showSetupModal(); return; }
  finishBoot();
}

function finishBoot() {
  document.getElementById('userDisplay').textContent =
    state.name ? (state.name + '（' + state.email + '）') : state.email;
  document.getElementById('changeIdentityBtn').style.display = 'inline-block';
  document.getElementById('adminBadge').style.display = state.isAdmin ? 'inline-block' : 'none';
  document.getElementById('adminTab').style.display = state.isAdmin ? 'block' : 'none';
  document.getElementById('logTab').style.display = state.isAdmin ? 'block' : 'none';
  renderDateOptions();
  resetForm(); // 切換帳號時清空殘留欄位
  loadMine();
  toggleAuto();
}

// =============== 首次設定 ===============
function showSetupModal() {
  document.getElementById('setupEmail').value = state.email || '';
  document.getElementById('setupName').value = state.name || '';
  document.getElementById('setupMsg').className = 'msg';
  document.getElementById('setupMsg').textContent = '';
  document.getElementById('setupModal').classList.add('show');
  setTimeout(() => document.getElementById('setupEmail').focus(), 100);
}
function hideSetupModal() { document.getElementById('setupModal').classList.remove('show'); }

async function submitSetup() {
  const email = (document.getElementById('setupEmail').value || '').trim().toLowerCase();
  const name = (document.getElementById('setupName').value || '').trim();
  const msg = document.getElementById('setupMsg');
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    msg.className = 'msg error'; msg.textContent = '請輸入正確的 Email 格式'; return;
  }
  if (!name) { msg.className = 'msg error'; msg.textContent = '請輸入您的姓名'; return; }
  state.email = email; state.name = name;
  state.phone = localStorage.getItem(phoneKey(email)) || '';
  localStorage.setItem(LS_EMAIL, email);
  localStorage.setItem(LS_NAME, name);
  hideSetupModal();
  try {
    const d = await api('getBootstrap', state.email);
    state.isAdmin = d.isAdmin;
    state.openDates = d.openDates;
    finishBoot();
  } catch (e) {
    msg.className = 'msg error';
    msg.textContent = (e && e.message) ? e.message : e;
    showSetupModal();
  }
}

// =============== 分頁 ===============
function switchTab(name) {
  document.querySelectorAll('nav.tabs button').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === name);
  });
  ['register', 'overview', 'log', 'admin'].forEach(t => {
    const el = document.getElementById('tab-' + t);
    if (el) el.style.display = (t === name) ? 'block' : 'none';
  });
  if (name === 'overview') loadOverview();
  if (name === 'log') loadLog();
  if (name === 'admin') loadAdminDates();
}

function renderDateOptions() {
  const sel = document.getElementById('f-date');
  sel.innerHTML = '<option value="">— 請選擇 —</option>';
  state.openDates.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.date;
    opt.textContent = d.date + (d.label ? '（' + d.label + '）' : '');
    sel.appendChild(opt);
  });
  if (!state.openDates.length) {
    const opt = document.createElement('option');
    opt.disabled = true; opt.textContent = '（管理員尚未開放任何日期）';
    sel.appendChild(opt);
  }
}

// =============== 訊息 ===============
function showMsg(text, type) {
  const el = document.getElementById('globalMsg');
  el.className = 'msg ' + (type || 'success');
  el.textContent = text;
  setTimeout(() => { el.className = 'msg'; el.textContent = ''; }, 4000);
}
function onError(err) {
  showMsg('❌ ' + (err && err.message ? err.message : err), 'error');
}

// =============== 我的登記 ===============
async function loadMine() {
  if (!state.email) { document.getElementById('mineList').innerHTML = '<div class="empty">請先設定您的 Email</div>'; return; }
  try {
    const rows = await api('getMyRegistrations', state.email);
    renderMine(rows);
  } catch (e) { onError(e); }
}

function renderMine(rows) {
  const wrap = document.getElementById('mineList');
  if (!rows.length) { wrap.innerHTML = '<div class="empty">尚無登記</div>'; return; }
  rows.sort((a, b) => a.date.localeCompare(b.date) || a.unit.localeCompare(b.unit));
  let html = '<table><thead><tr><th>單位</th><th>聯絡人</th><th>手機</th><th class="num">午餐</th><th class="num">晚餐</th><th>備註</th><th>操作</th></tr></thead><tbody>';
  let curDate = null;
  rows.forEach(r => {
    if (curDate !== r.date) {
      html += `<tr class="date-header"><td colspan="7">📅 ${esc(r.date)}</td></tr>`;
      curDate = r.date;
    }
    html += `<tr>
      <td>${esc(r.unit)}</td>
      <td>${esc(r.contact)}</td>
      <td>${esc(r.phone)}</td>
      <td class="num">${r.lunch}</td>
      <td class="num">${r.dinner}</td>
      <td>${esc(r.note)}</td>
      <td>
        <button class="btn secondary" onclick='editReg(${JSON.stringify(r).replace(/'/g,"&#39;")})'>修改</button>
        <button class="btn danger" onclick="deleteReg('${r.id}')">刪除</button>
      </td>
    </tr>`;
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

async function saveReg() {
  const btn = document.getElementById('btnSave');
  btn.disabled = true;
  const payload = {
    id: document.getElementById('editId').value,
    unit: document.getElementById('f-unit').value,
    contact: document.getElementById('f-contact').value,
    phone: document.getElementById('f-phone').value,
    date: document.getElementById('f-date').value,
    lunch: document.getElementById('f-lunch').value,
    dinner: document.getElementById('f-dinner').value,
    note: document.getElementById('f-note').value
  };
  try {
    await api('saveRegistration', payload, state.email);
    // 記住這個帳號最後填的手機號，下次自動帶
    if (payload.phone && state.email) {
      state.phone = payload.phone;
      localStorage.setItem(phoneKey(state.email), payload.phone);
    }
    showMsg('✅ 已儲存');
    resetForm();
    loadMine();
  } catch (e) { onError(e); }
  finally { btn.disabled = false; }
}

function editReg(r) {
  document.getElementById('editId').value = r.id;
  document.getElementById('f-unit').value = r.unit;
  document.getElementById('f-contact').value = r.contact;
  document.getElementById('f-phone').value = r.phone;
  document.getElementById('f-date').value = r.date;
  document.getElementById('f-lunch').value = r.lunch;
  document.getElementById('f-dinner').value = r.dinner;
  document.getElementById('f-note').value = r.note;
  document.getElementById('formTitle').textContent = '修改登記';
  document.getElementById('btnCancel').style.display = 'inline-block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function cancelEdit() { resetForm(); }
function resetForm() {
  document.getElementById('editId').value = '';
  document.getElementById('f-unit').value = '';
  document.getElementById('f-contact').value = state.name || '';
  document.getElementById('f-phone').value = state.phone || '';
  document.getElementById('f-date').value = '';
  document.getElementById('f-lunch').value = '0';
  document.getElementById('f-dinner').value = '0';
  document.getElementById('f-note').value = '';
  document.getElementById('formTitle').textContent = '新增報餐登記';
  document.getElementById('btnCancel').style.display = 'none';
}

async function deleteReg(id) {
  if (!confirm('確定要刪除這筆登記嗎？')) return;
  try {
    await api('deleteRegistration', id, state.email);
    showMsg('✅ 已刪除'); loadMine();
  } catch (e) { onError(e); }
}

// =============== 總覽 ===============
async function loadOverview() {
  try { renderSummary(await api('getSummary', state.email)); }
  catch (e) { onError(e); }
}

function renderSummary(data) {
  lastSummary = data;
  const sel = document.getElementById('overviewDateFilter');
  const allDates = data.byDate.map(d => d.date);
  const saved = state.overviewFilter || '';
  sel.innerHTML = '<option value="">全部日期</option>' +
    allDates.map(d => `<option value="${esc(d)}">${esc(d)}</option>`).join('');
  sel.value = (allDates.indexOf(saved) >= 0) ? saved : '';
  state.overviewFilter = sel.value;

  const filter = state.overviewFilter;
  const byDate = filter ? data.byDate.filter(r => r.date === filter) : data.byDate;
  const byUnit = filter ? data.byUnit.filter(r => r.date === filter) : data.byUnit;
  renderSummaryByDate(byDate);
  renderSummaryByUnit(byUnit);
}

function renderSummaryByDate(rows) {
  const w = document.getElementById('summaryByDate');
  if (!rows.length) { w.innerHTML = '<div class="empty">尚無資料</div>'; return; }
  let h = '<table><thead><tr><th>日期</th><th class="num">午餐</th><th class="num">晚餐</th><th class="num">當日合計</th></tr></thead><tbody>';
  rows.forEach(r => {
    h += `<tr><td>${esc(r.date)}</td><td class="num meal-total">${r.lunch}</td><td class="num meal-total">${r.dinner}</td><td class="num">${r.lunch + r.dinner}</td></tr>`;
  });
  h += '</tbody></table>';
  w.innerHTML = h;
}

function renderSummaryByUnit(rows) {
  const w = document.getElementById('summaryByUnit');
  if (!rows.length) { w.innerHTML = '<div class="empty">尚無資料</div>'; return; }
  let h = '<table><thead><tr><th>日期</th><th>單位/組別</th><th>聯絡人</th><th class="num">午餐</th><th class="num">晚餐</th></tr></thead><tbody>';
  const fmtContact = c => {
    if (typeof c === 'string') return c; // 向下相容舊資料
    return c.phone ? (c.name + '（' + c.phone + '）') : c.name;
  };
  rows.forEach(r => {
    const contactsStr = (r.contacts || []).map(fmtContact).join('、');
    h += `<tr><td>${esc(r.date)}</td><td>${esc(r.unit)}</td><td>${esc(contactsStr)}</td><td class="num">${r.lunch}</td><td class="num">${r.dinner}</td></tr>`;
  });
  h += '</tbody></table>';
  w.innerHTML = h;
}

function onDateFilterChange() {
  state.overviewFilter = document.getElementById('overviewDateFilter').value;
  if (lastSummary) renderSummary(lastSummary);
}

function toggleAuto() {
  if (state.autoTimer) { clearInterval(state.autoTimer); state.autoTimer = null; }
  if (document.getElementById('autoRefresh').checked) {
    state.autoTimer = setInterval(() => {
      const tab = document.querySelector('nav.tabs button.active').dataset.tab;
      if (tab === 'overview') loadOverview();
      else if (tab === 'log') loadLog();
      else if (tab === 'register') loadMine();
    }, 10000);
  }
}

// =============== 日誌 ===============
async function loadLog() {
  if (!state.isAdmin) return;
  try { renderLog(await api('getLog', 200, state.email)); }
  catch (e) { onError(e); }
}
function renderLog(rows) {
  const wrap = document.getElementById('logList');
  if (!rows.length) { wrap.innerHTML = '<div class="empty">尚無日誌</div>'; return; }
  let h = '<table><thead><tr><th>時間</th><th>操作者</th><th>操作</th><th>單位</th><th>日期</th><th class="num">午餐</th><th class="num">晚餐</th><th>說明</th></tr></thead><tbody>';
  rows.forEach(r => {
    h += `<tr>
      <td>${esc(r.time)}</td>
      <td>${esc(r.actor)}</td>
      <td>${esc(r.action)}</td>
      <td>${esc(r.unit)}</td>
      <td>${esc(r.date)}</td>
      <td class="num">${fmtDelta(r.lunchDelta)}</td>
      <td class="num">${fmtDelta(r.dinnerDelta)}</td>
      <td>${esc(r.note)}</td>
    </tr>`;
  });
  h += '</tbody></table>';
  wrap.innerHTML = h;
}
function fmtDelta(n) {
  if (n > 0) return '<span class="delta-plus">+' + n + '</span>';
  if (n < 0) return '<span class="delta-minus">' + n + '</span>';
  return '0';
}

// =============== 管理員 ===============
async function loadAdminDates() {
  if (!state.isAdmin) return;
  try { renderAdminDates(await api('adminGetAllDates', state.email)); }
  catch (e) { onError(e); }
}
function renderAdminDates(rows) {
  const wrap = document.getElementById('adminDateList');
  if (!rows.length) { wrap.innerHTML = '<div class="empty">尚未設定任何日期</div>'; return; }
  let h = '<table><thead><tr><th>日期</th><th>說明</th><th>狀態</th><th>操作</th></tr></thead><tbody>';
  rows.forEach(r => {
    const isOpen = r.status !== '關閉';
    h += `<tr>
      <td>${esc(r.date)}</td>
      <td>${esc(r.label)}</td>
      <td><span class="pill ${isOpen ? '' : 'closed'}">${esc(r.status)}</span></td>
      <td><button class="btn secondary" onclick="adminToggle('${r.date}','${isOpen ? '關閉' : '開放'}')">${isOpen ? '關閉' : '開放'}</button></td>
    </tr>`;
  });
  h += '</tbody></table>';
  wrap.innerHTML = h;
}
async function adminAddDate() {
  const date = document.getElementById('adm-date').value;
  const label = document.getElementById('adm-label').value;
  if (!date) { showMsg('請選擇日期', 'error'); return; }
  try {
    await api('adminAddOpenDate', date, label, state.email);
    showMsg('✅ 已新增日期');
    document.getElementById('adm-date').value = '';
    document.getElementById('adm-label').value = '';
    loadAdminDates();
    state.openDates = await api('getAllOpenDates');
    renderDateOptions();
  } catch (e) { onError(e); }
}
async function adminToggle(date, status) {
  try {
    await api('adminSetDateStatus', date, status, state.email);
    showMsg('✅ 已更新');
    loadAdminDates();
    state.openDates = await api('getAllOpenDates');
    renderDateOptions();
  } catch (e) { onError(e); }
}

// =============== utils ===============
function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[c]);
}
